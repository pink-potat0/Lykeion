<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Learn to trade Solana memecoins with lessons, practice tools, and an AI trading assistant.">
    <title>Lykeion - Dashboard</title>
    <link rel="icon" type="image/png" href="../assets/icons/favicon.png">
    <link rel="apple-touch-icon" href="../assets/icons/favicon.png">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="../scripts/firebase-config.js"></script>
    <script src="../scripts/firestore-utils.js"></script>
</head>
<body>
    <div class="cursor-glow"></div>
    <div class="background-pattern"></div>
    
    <nav class="navbar">
        <span class="nav-logo">Lykeion</span>
        <div style="display: flex; gap: 16px; align-items: center;">
            <a href="https://x.com/_ppotat0"><img src="../assets/icons/icons8-x-50.png" alt="Close" class="x-icon"></a>
        </div>
    </nav>
    
    <main class="main-content dashboard-main">
        <div class="greeting-block fade-in-up">
            <p class="greeting-label">Hello,</p>
            <h1 class="dashboard-greeting" id="greeting">user</h1>
        </div>

        <div class="dashboard-cards deck-shell">
            <div class="works-deck">
                <div class="dashboard-card work-swipe-card fade-in-up delay-1" data-card="1" data-href="lycuem-course">
                    <div class="card-content">
                        <h3 class="card-title">Memecoin Lessons</h3>
                        <p class="card-description">Learn to trade Solana memecoins step by step</p>
                    </div>
                </div>
                <div class="dashboard-card work-swipe-card fade-in-up delay-2" data-card="2" data-href="lykeion-ai">
                    <div class="card-content">
                        <h3 class="card-title">AI assistant</h3>
                        <p class="card-description">Ask anything about Solana, memecoins, and trading strategies</p>
                    </div>
                </div>
                <div class="dashboard-card work-swipe-card fade-in-up delay-2" data-card="3" data-href="demo-trading">
                    <div class="card-content">
                        <h3 class="card-title">Demo Trading</h3>
                        <p class="card-description">Practice trading in a simulated environment</p>
                    </div>
                </div>
            </div>
        </div>
        <p class="swipe-hint">swipe left or right</p>
    </main>

    <a href="/" class="floating-back-btn" title="Go back">
        <span>←</span>
    </a>

    <script src="../scripts/cursor-utils.js"></script>
    <script src="../scripts/dashboard.js"></script>
    <script src="/scripts/vercel-analytics.js"></script>
</body>
</html>
