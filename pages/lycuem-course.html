              <h3 class="section-title">Cryptocurrency – meaning and definition</h3>
              <p>Cryptocurrency, sometimes called crypto-currency or crypto, is any form of currency that exists digitally or virtually and uses cryptography to secure transactions. Cryptocurrencies don't have a central issuing or regulating authority, instead using a decentralized system to record transactions and issue new units.</p>
            </section>

            <section class="lesson-section">
              <h3 class="section-title">What is cryptocurrency?</h3>
              <p>Cryptocurrency is a digital form of money that doesn't rely on banks or governments. It works through a peer-to-peer system, allowing people to send and receive payments directly with anyone, anywhere.</p>
              <p>Instead of physical cash, cryptocurrencies exist only online as records of transactions stored on a public ledger. These transactions are secured using encryption, which keeps payments safe and prevents fraud. Cryptocurrencies are stored and managed using digital wallets.</p>

              <p>New coins can be created through processes like mining or other validation methods, depending on the network. When you own cryptocurrency, you don't own something physical—you own a private key that gives you control over your funds and lets you transfer them without a middleman.</p>

    // Load user progress and update sidebar
    async function loadUserProgress() {
      const user = firebase.auth().currentUser;
      if (!user) return;
      
      try {
        const allProgress = await getAllLessonsProgress(user.uid);
        document.querySelectorAll('.sidebar-item').forEach(item => {
          const lessonId = item.dataset.lessonId;
          if (lessonId && allProgress[lessonId] && allProgress[lessonId].completed) {
            item.classList.add('completed');
          }
        });
      } catch (error) {
        console.error('Error loading progress:', error);
      }
    }

    // Check auth state and load progress (after Firebase config from /api/firebase-config)
    window.__firebaseReadyPromise.then(function () {
      firebase.auth().onAuthStateChanged(async (user) => {
        if (user) {
          await loadUserProgress();
          // Load first lesson by default
          loadChapterContent('1');
        } else {
          window.location.href = 'login.html';
        }
      });
    }).catch(function (err) {
      console.error('Firebase init failed:', err);
    });

    // Chapter navigation
    document.querySelectorAll('.sidebar-item').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        
        // Remove active from all items
        document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
        
        // Add active to clicked item
        item.classList.add('active');
        
        // Update content based on chapter
        const chapter = item.dataset.chapter;
        loadChapterContent(chapter);
        window.scrollTo({ top: 0, behavior: 'smooth' });

        // Close sidebar on mobile after selection
        if (window.innerWidth <= 768) {
          setTimeout(closeSidebar, 300);
        }
      });
    });

    // Next Lesson Button Handler
    document.addEventListener('click', async (e) => {
      if (e.target.id === 'nextLessonBtn' || e.target.closest('#nextLessonBtn')) {
        await window.__firebaseReadyPromise;
        const btn = e.target.closest('#nextLessonBtn') || e.target;
        const nextChapter = btn.dataset.nextChapter;
        const user = firebase.auth().currentUser;
        
        if (!user) {
          alert('Please log in to continue');
          return;
        }
        
        try {
          // Determine current chapter from active sidebar item
          const activeItem = document.querySelector('.sidebar-item.active');
          const currentChapter = activeItem ? activeItem.dataset.chapter : '1';
          const currentLessonId = `lesson-${currentChapter}`;
          
          // Save lesson completion
          await saveLessonProgress(user.uid, currentLessonId, {
            completed: true,
            completedAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          
          // Update sidebar to show completed
          const completedItem = document.querySelector(`[data-lesson-id="${currentLessonId}"]`);
          if (completedItem) {
            completedItem.classList.add('completed');
          }
          
          // Switch to next chapter
          if (nextChapter === '2' || nextChapter === '3' || nextChapter === '4' || nextChapter === '5') {
            const nextItem = document.querySelector(`[data-chapter="${nextChapter}"]`);
            if (nextItem) {
              nextItem.click();
            }
          }
        } catch (error) {
          console.error('Error saving progress:', error);
          alert('Error saving progress. Please try again.');
        }
      }
    });
