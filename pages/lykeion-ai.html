<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Learn to trade Solana memecoins with lessons, practice tools, and an AI trading assistant." />
  <title>Lykeion - Assistant</title>
  <link rel="icon" type="image/png" href="../assets/icons/favicon.png" />
  <link rel="apple-touch-icon" href="../assets/icons/favicon.png" />
  <link rel="stylesheet" href="../styles/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="../scripts/firebase-config.js"></script>
  <script src="../scripts/firestore-utils.js"></script>
</head>
<body class="page-ai">
  <div class="cursor-glow"></div>
  <div class="background-pattern"></div>

  <nav class="navbar">
    <span class="nav-logo">Lykeion Assistant</span>
    <div style="display: flex; gap: 16px; align-items: center;">
      <a href="dashboard.html"><img src="../assets/icons/icons8-x-50.png" alt="Close" class="x-icon" /></a>
    </div>
  </nav>

  <div class="ai-container">
    <div class="ai-header">
      <p class="ai-subtitle">Ask me anything about Solana.</p>
    </div>
    <div class="ai-message-content">
      <ul>
        <li>Send me a CA</li>
        <li>Ask me the price of major tokens e.g BTC</li>
        <li>Ask me to analyze this wallet</li>
      </ul>
    </div>
    <div class="chat-container" id="chat-container">
      <!-- Chat messages will be appended here -->
    </div>
    <form id="chat-form" autocomplete="off">
      <input type="text" id="user-input" class="ai-chat-input" placeholder="Type your message..." required autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" name="lykeion-chat-input">
      <button id="send-btn" class="ai-send-btn">Send</button>
    </form>
  </div>
  <a href="dashboard.html" class="floating-back-btn" title="Go back"><span>←</span></a>
  <div class="cpotato-signature">© 2026 pinkpotato</div>

    <script src="../scripts/bootstrap-secrets.js"></script>
    <script src="../scripts/bootstrap-secrets-fetch.js"></script>
    <script src="../scripts/cursor-utils.js"></script>
    <script src="../scripts/crypto-price.js"></script>
    <script src="../scripts/context-fetcher.js"></script>
    <script src="../scripts/chat-ui.js"></script>
    <!-- Loads lykeion-ai.js after merging /api/lykeion-secrets (Vercel HELIUS_API_KEY) into LYKEION_SECRETS -->
    <script src="../scripts/bootstrap-secrets-remote.js"></script>
</body>
</html>
