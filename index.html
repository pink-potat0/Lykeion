<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Learn to trade Solana memecoins with lessons, practice tools, and an AI trading assistant.">
    <title>Lykeion - Learn About Solana Trading</title>
    <link rel="icon" type="image/png" href="assets/icons/favicon.png">
    <link rel="apple-touch-icon" href="assets/icons/favicon.png">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="page-home">
    <div class="cursor-glow"></div>
    <div class="background-pattern"></div>
    
    <nav class="navbar">
        <span class="nav-logo">Lykeion</span>
        <button type="button" class="ca-badge" data-ca="GWpjiGgTo2RckTLRo71AJijvxkhescZ4QgSGWdPbpump" title="Click to copy Lykeion CA">
            <span class="ca-label">CA</span>
            <span class="ca-value">GWpji...pump</span>
            <span class="ca-copy" aria-hidden="true">⧉</span>
        </button>
        <a href="https://x.com/_ppotat0"><img src="assets/icons/icons8-x-50.png" alt="Close" class="x-icon"></a>
    </nav>
    
    <main class="main-content">
        <div class="container">
            <h1 class="main-title fade-in-up">
                Learn to Trade <span class="psol">Solana</span> memecoins
            </h1>
            <p class="subtxt fade-in-up delay-1">
                Lessons, practice tools, and an AI trading assistant<br>
                all in one place.
            </p>
        </div>
        <button class="btn fade-in-up delay-2" onclick="window.location.href='/pages/login'">
            <span class="btn-text">Get Started</span>
            <span class="btn-arrow">→</span>
        </button>
    </main>
    <script src="scripts/cursor-utils.js"></script>
    <script>
        (function () {
            const badge = document.querySelector('.ca-badge');
            if (!badge) return;
            badge.addEventListener('click', async () => {
                const ca = badge.getAttribute('data-ca');
                if (!ca) return;
                try {
                    await navigator.clipboard.writeText(ca);
                } catch (err) {
                    const ta = document.createElement('textarea');
                    ta.value = ca;
                    document.body.appendChild(ta);
                    ta.select();
                    try { document.execCommand('copy'); } catch (_) {}
                    ta.remove();
                }
                badge.classList.add('is-copied');
                const valEl = badge.querySelector('.ca-value');
                const prev = valEl ? valEl.textContent : '';
                if (valEl) valEl.textContent = 'copied';
                setTimeout(() => {
                    badge.classList.remove('is-copied');
                    if (valEl) valEl.textContent = prev;
                }, 1200);
            });
        })();
    </script>
    <script src="index.js"></script>
    <script src="/scripts/vercel-analytics.js"></script>
    <footer class="footer">
        <p>&copy; 2026 pinkpotato</p>
    </footer>
</body>
</html>
